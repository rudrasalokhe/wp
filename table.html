<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div{
            border: 1px solid black;
            margin-right: 1350px;
            padding: 10px;
            
        }
        table{
            border-collapse: collapse;
        }
        tr,td{
            border: 1px solid black;
            padding: 3px;
            text-align: center;
        }
        button{
            background-color: red;
            transition: 0.3 sec;
            color: white;

        }
        button:hover{
            box-shadow: 0px 0px 10px;
            transform: translateY(-5px);
            cursor: pointer;    
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
    <table>
        <tr>
            <td colspan="4">0</td>
        </tr>
        <tr>
            <td><button>C</button></td>
            <td><button>%</button></td>
            <td><button><=</button></td>
            <td><button>/</button></td>
        </tr>
        <tr>
            <td><button>7</button></td>
            <td><button>8</button></td>
            <td><button>9</button></td>
            <td><button>*</button></td>
        </tr>
        <tr>
            <td><button>4</button></td>
            <td><button>5</button></td>
            <td><button>6</button></td>
            <td><button>-</button></td>
        </tr>
    </table>
    </div>
</body>
</html>
